<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Sheet metal plate -->
  <rect x="6" y="20" width="52" height="28" rx="3" ry="3" fill="#e74c3c" opacity="0.15" stroke="#e74c3c" stroke-width="2"/>
  <!-- Bend line -->
  <line x1="6" y1="34" x2="58" y2="34" stroke="#e74c3c" stroke-width="2" stroke-dasharray="4,3"/>
  <!-- Top folded flange -->
  <path d="M6 20 Q6 10 16 10 L48 10 Q58 10 58 20" fill="none" stroke="#e74c3c" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Punch holes -->
  <circle cx="20" cy="41" r="3.5" fill="none" stroke="#e74c3c" stroke-width="1.8"/>
  <circle cx="32" cy="41" r="3.5" fill="none" stroke="#e74c3c" stroke-width="1.8"/>
  <circle cx="44" cy="41" r="3.5" fill="none" stroke="#e74c3c" stroke-width="1.8"/>
  <!-- Rivet marks on top flange -->
  <circle cx="22" cy="14" r="2" fill="#e74c3c" opacity="0.6"/>
  <circle cx="42" cy="14" r="2" fill="#e74c3c" opacity="0.6"/>
</svg>
